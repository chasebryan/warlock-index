name: Enforce HTTPS

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: enforce-https
  cancel-in-progress: true

jobs:
  enforce:
    name: Enable GitHub Pages HTTPS when certificate is ready
    runs-on: ubuntu-latest

    steps:
      - name: Check and enforce HTTPS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -n "${PAGES_ADMIN_TOKEN:-}" ]]; then
            export GH_TOKEN="$PAGES_ADMIN_TOKEN"
            echo "Using PAGES_ADMIN_TOKEN for Pages settings update."
          else
            export GH_TOKEN="$GITHUB_TOKEN"
            echo "PAGES_ADMIN_TOKEN is not configured; using GITHUB_TOKEN."
          fi

          page_json="$(gh api "repos/${GITHUB_REPOSITORY}/pages")"
          cname="$(jq -r '.cname // ""' <<<"$page_json")"
          status="$(jq -r '.status // ""' <<<"$page_json")"
          https_enforced="$(jq -r '.https_enforced // false' <<<"$page_json")"

          echo "Pages status: ${status}"
          echo "Custom domain: ${cname:-none}"
          echo "HTTPS enforced: ${https_enforced}"

          if [[ "$https_enforced" == "true" ]]; then
            echo "HTTPS is already enforced."
            exit 0
          fi

          set +e
          response="$(gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" -F https_enforced=true 2>&1)"
          result=$?
          set -e

          echo "$response"

          if [[ "$result" -eq 0 ]]; then
            echo "HTTPS enforcement enabled."
            exit 0
          fi

          if grep -qi "certificate does not exist yet" <<<"$response"; then
            echo "GitHub Pages certificate is not ready yet; exiting cleanly."
            exit 0
          fi

          if grep -qi "Resource not accessible by integration" <<<"$response"; then
            echo "::notice::GITHUB_TOKEN cannot update GitHub Pages settings. Add a PAGES_ADMIN_TOKEN repository secret with permission to update Pages settings for full automatic enforcement."
            exit 0
          fi

          exit "$result"
